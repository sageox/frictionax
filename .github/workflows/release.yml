name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@v1.13.0

      - name: Build
        run: go build ./...

      - name: Test
        run: gotestsum --format=testdox -- -race ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest

  release:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Verify CHANGELOG has entry for this version
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          VERSION_NUM="${VERSION#v}"
          if ! grep -q "## \[${VERSION_NUM}\]" CHANGELOG.md; then
            echo "ERROR: CHANGELOG.md does not contain an entry for version ${VERSION_NUM}"
            exit 1
          fi
          echo "Found CHANGELOG entry for ${VERSION_NUM}"

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          VERSION_NUM="${VERSION#v}"

          # Extract the section for this version from CHANGELOG.md
          # This captures everything between ## [X.Y.Z] and the next ## [
          NOTES=$(awk -v ver="$VERSION_NUM" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "\\[" ver "\\]") found=1
              next
            }
            found { print }
          ' CHANGELOG.md)

          # Write to file for multiline output
          echo "$NOTES" > release_notes.md
          echo "notes_file=release_notes.md" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.changelog.outputs.notes_file }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger pkg.go.dev update
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          curl -s "https://proxy.golang.org/github.com/sageox/frictionx/@v/${VERSION}.info" || true
          echo "Triggered pkg.go.dev indexing for ${VERSION}"
